           C160 140 176 124 196 124 
           L316 124 
           C336 124 352 140 352 160 
           L352 220 
           C352 240 336 256 316 256 
           L196 256 
           C176 256 160 272 160 292 
           L160 352 
           C160 372 176 388 196 388 
           L316 388 
           C336 388 352 372 352 352" 
        stroke="white" 
        stroke-width="28" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none" />
  <!-- Speed/performance indicator - small chevron -->
  <polygon points="380,200 420,256 380,312" fill="white" opacity="0.8" />
  <!-- Inner glow dot -->
  <circle cx="256" cy="256" r="80" fill="white" opacity="0.08" />
</svg>
