name: Feature Request
description: Suggest an idea for STGR Browser
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature for STGR Browser!
        Please check existing issues and the [roadmap](https://stgr-browser.dev/roadmap) first.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like
      placeholder: "A clear description of what you want to happen"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What workarounds or alternatives have you considered?
      placeholder: "I've tried..."

  - type: checkboxes
    id: principles
    attributes:
      label: STGR Principles Check
      description: Does this feature align with STGR's core values?
      options:
        - label: "No data collection or telemetry"
          required: true
        - label: "No privacy impact"
        - label: "Minimal performance overhead"
        - label: "No external dependencies / cloud services"

  - type: textarea
    id: implementation
    attributes:
      label: Implementation Ideas
      description: Any thoughts on how this could be implemented?
      placeholder: "Sketches, API suggestions, references..."

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or references
